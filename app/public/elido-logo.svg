<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a8e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="#f0ece4" stroke-width="4"/>
  <!-- Inner decorative ring -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#f0ece4" stroke-width="1" opacity="0.4"/>
  <!-- Building icon -->
  <g transform="translate(100,70)" fill="#f0ece4">
    <!-- Main building body -->
    <rect x="-18" y="-20" width="36" height="40" rx="2"/>
    <!-- Roof triangle -->
    <polygon points="-22,-18 0,-34 22,-18"/>
    <!-- Door -->
    <rect x="-5" y="5" width="10" height="15" rx="1" fill="#1e3a5f"/>
    <!-- Windows row 1 -->
    <rect x="-12" y="-12" width="6" height="6" rx="0.5" fill="#1e3a5f"/>
    <rect x="6" y="-12" width="6" height="6" rx="0.5" fill="#1e3a5f"/>
    <!-- Windows row 2 -->
    <rect x="-12" y="-2" width="6" height="6" rx="0.5" fill="#1e3a5f"/>
    <rect x="6" y="-2" width="6" height="6" rx="0.5" fill="#1e3a5f"/>
  </g>
  <!-- ELIDO text -->
  <text x="100" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#f0ece4" letter-spacing="4">ELIDO</text>
  <!-- Decorative line -->
  <line x1="55" y1="125" x2="145" y2="125" stroke="#f0ece4" stroke-width="1" opacity="0.5"/>
  <!-- Hebrew subtitle -->
  <text x="100" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f0ece4">סוכנות לביטוח ופיננסים</text>
</svg>
